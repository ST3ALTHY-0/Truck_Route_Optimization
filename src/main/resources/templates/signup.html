<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TruckRoute Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>

<body>
    <div class="container" style="max-width: 420px; padding-top: 8rem;">
        <div class="card shadow">
            <div class="card-header text-center">
                <h4 class="mb-0">Create Account</h4>
                <small class="text-muted">TruckRoute Optimizer</small>
            </div>
            <div class="card-body">
                <div th:if="${signupError}" class="alert alert-danger" role="alert" th:text="${signupError}"></div>

                <form th:action="@{/signup}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-control" required minlength="3" maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Already have an account? <a th:href="@{/login}">Log in</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
