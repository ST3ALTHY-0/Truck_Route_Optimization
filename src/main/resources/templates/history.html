<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - TruckRoute Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--secondary);">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">TruckRoute Optimizer</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a class="btn btn-outline-light btn-sm" th:href="@{/}">Back to Home</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h2 class="mb-3">Your Saved Results</h2>
        <p class="text-muted">Only results created by your account are shown here.</p>

        <div th:if="${#lists.isEmpty(historyItems)}" class="alert alert-info" role="alert">
            No saved results yet. Run an optimization to create your first history entry.
        </div>

        <div th:if="${!#lists.isEmpty(historyItems)}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead>
                    <tr>
                        <th scope="col">Created At</th>
                        <th scope="col">Routes</th>
                        <th scope="col">Stops</th>
                        <th scope="col">Total Distance</th>
                        <th scope="col">Result ID</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${historyItems}">
                        <td th:text="${item.createdAt()}"></td>
                        <td th:text="${item.routeCount()}"></td>
                        <td th:text="${item.totalStops()}"></td>
                        <td th:text="${item.totalDistance()}"></td>
                        <td><code th:text="${item.id()}"></code></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
